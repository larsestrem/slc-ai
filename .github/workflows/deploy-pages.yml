# Preview deployment to GitHub Pages (https://larsestrem.github.io/slc-ai/).
# Production remains Cloudflare Pages at senior.living.community (wrangler.toml):
# this workflow rewrites root-relative URLs to the /slc-ai/ project path and
# blocks indexing, so the preview never competes with the real domain.
name: Deploy preview to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: bundle exec jekyll build
      - name: Prefix root-relative URLs for the project-pages path
        run: |
          find _site -name '*.html' -print0 | xargs -0 sed -i 's|href="/|href="/slc-ai/|g; s|src="/|src="/slc-ai/|g'
          printf 'User-agent: *\nDisallow: /\n' > _site/robots.txt
          rm -f _site/sitemap.xml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - id: deployment
        uses: actions/deploy-pages@v4
