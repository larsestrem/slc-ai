---
layout: default
---
<article class="prose">
  <h1>{{ page.title }}</h1>
  <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time></p>
  {{ content }}
  {%- if page.sources %}
  <p class="notice">Sources:
    {%- for s in page.sources %} <a href="{{ s.url }}" rel="nofollow noopener">{{ s.name }}</a>{% unless forloop.last %} ·{% endunless %}{% endfor %}
  </p>
  {%- endif %}
</article>
