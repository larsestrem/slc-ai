# senior.living.community - Jekyll configuration

# ==========================================================================
# PRE-LAUNCH INDEXING BLOCK - do not remove without the owner's explicit go-live
# While noindex_site is true, every page emits <meta robots noindex, nofollow>
# and robots.txt disallows all crawlers, so the staging site (slc-ai.pages.dev)
# stays out of search results. Setting this to false is a deliberate LAUNCH step,
# never a cleanup. Only the owner decides when the site goes live on
# senior.living.community. See docs/LAUNCH-CHECKLIST.md.
noindex_site: true
# ==========================================================================

title: Senior Living Community
tagline: An independent guide to evaluating and choosing the right senior care for your loved one
description: >-
  A senior living directory and plain-language guide for families choosing
  independent living, assisted living, memory care, or nursing care.
url: "https://senior.living.community"
baseurl: ""
lang: en

# Data provenance shown sitewide (updated by scripts/fetch_cms.py)
data_vintage:
  cms_note: "Facility details verified against public sources; CMS Care Compare ratings shown where available."
  last_verified: "2026-07-11"

# Form submissions (community questionnaires) are delivered privately by email
# via FormSubmit; the endpoint encodes the destination address (base64) so the
# plain address never appears in page source.
forms:
  endpoint: "https://formsubmit.co/bGFyc2VzdHJlbUBnbWFpbC5jb20="

permalink: /news/:year/:month/:title/

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - scripts/
  - data/
  - docs/
  - vendor/

defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: ""
      type: posts
    values:
      layout: post
