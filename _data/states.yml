# The five launch states. Add a state here + a data/facilities/<slug>.json file,
# then run scripts/generate.py --state <slug>.
- slug: california
  name: California
  abbrev: CA
  licensing:
    agency: "California Department of Social Services, Community Care Licensing Division"
    lookup_url: "https://www.ccld.dss.ca.gov/carefacilitysearch/"
    small_home: "Residential Care Facilities for the Elderly (RCFE) — small homes are licensed for up to 6 residents"
    note: "Assisted living and residential care homes are licensed as RCFEs by the Community Care Licensing Division; skilled nursing facilities are certified by CMS and licensed by the California Department of Public Health."
- slug: idaho
  name: Idaho
  abbrev: ID
  licensing:
    agency: "Idaho Department of Health and Welfare, Bureau of Facility Standards"
    lookup_url: "https://healthandwelfare.idaho.gov/"
    small_home: "Certified Family Homes care for up to 4 residents in a caregiver's home"
    note: "Residential assisted living facilities are licensed by the Bureau of Facility Standards; very small settings operate as Certified Family Homes."
- slug: nevada
  name: Nevada
  abbrev: NV
  licensing:
    agency: "Nevada Division of Public and Behavioral Health, Bureau of Health Care Quality and Compliance"
    lookup_url: "https://dpbh.nv.gov/Reg/HealthFacilities/HealthFacilities_Home/"
    small_home: "Residential Facilities for Groups serve small groups of residents in home settings"
    note: "Assisted living communities are licensed as Residential Facilities for Groups by the Bureau of Health Care Quality and Compliance."
- slug: oregon
  name: Oregon
  abbrev: OR
  licensing:
    agency: "Oregon Department of Human Services, Aging and People with Disabilities"
    lookup_url: "https://ltclicensing.oregon.gov/"
    small_home: "Adult Foster Homes care for up to 5 residents in a residential home"
    note: "Assisted living, residential care facilities, and memory care endorsements are licensed by ODHS Aging and People with Disabilities; Adult Foster Homes are the state's small-home option."
- slug: washington
  name: Washington
  abbrev: WA
  licensing:
    agency: "Washington DSHS Aging and Long-Term Support Administration"
    lookup_url: "https://fortress.wa.gov/dshs/adsaapps/lookup/"
    small_home: "Adult Family Homes care for up to 8 residents in a residential home"
    note: "Assisted living facilities and Adult Family Homes are licensed by DSHS; Washington has one of the largest small-home (Adult Family Home) sectors in the country."
