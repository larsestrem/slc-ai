<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{%- assign page_title = page.seo_title | default: page.title -%}
<title>{% if page_title %}{{ page_title | escape }} | {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description | strip_newlines | strip | escape }}">
<link rel="canonical" href="{{ page.url | replace: 'index.html', '' | absolute_url }}">
{%- if page.noindex %}
<meta name="robots" content="noindex,follow">
{%- endif %}
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:title" content="{{ page_title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_newlines | strip | escape }}">
<meta property="og:url" content="{{ page.url | replace: 'index.html', '' | absolute_url }}">
<meta name="theme-color" content="#2f6f62">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%232f6f62'/><path d='M50 22 22 46h8v30h40V46h8z' fill='white'/></svg>">
<style>{% capture css %}{% include css/main.css %}{% endcapture %}{{ css }}</style>
